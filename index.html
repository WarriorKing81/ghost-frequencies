<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">
  <title>Ghost Frequency</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
</head>
<body>
  <div id="headphone-warning">
    <div class="warning-content">
      <h1>GHOST FREQUENCY</h1>
      <p>This experience requires headphones.</p>
      <p class="sub">Put them on before continuing.</p>
      <button id="start-btn">I'm wearing headphones</button>
    </div>
  </div>
  <canvas id="game-canvas"></canvas>
  <input type="text" id="question-input"
         placeholder="Ask the spirit..."
         autocomplete="off" autocorrect="off" spellcheck="false" />
  <script type="module" src="src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        // Check for updates every 60 seconds
        setInterval(() => reg.update(), 60000);

        // When a new SW is found and installed, auto-activate it
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New version ready — tell it to take over
              newWorker.postMessage('skipWaiting');
            }
          });
        });
      }).catch(() => {});

      // When the new SW takes control, reload to get the latest code
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
